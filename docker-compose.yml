services:
  # ── Backend (Node / Express) ─────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: syncstay-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env.docker
    environment:
      - PORT=5001
    networks:
      - syncstay-net

  # ── Frontend (Vite build → serve) ────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://ssapi.fedkiit.com/api
        - VITE_SOCKET_URL=https://ssapi.fedkiit.com
        - VITE_RAZORPAY_KEY_ID=rzp_test_SHTHhd0ibiOnrO
    container_name: syncstay-frontend
    restart: unless-stopped
    ports:
      - "3030:3000"
    depends_on:
      - backend
    networks:
      - syncstay-net

  # ── ML Server (FastAPI) ─────────────────────────────
  ml-server:
    build:
      context: ./ml-server
      dockerfile: Dockerfile
    container_name: syncstay-ml-server
    restart: unless-stopped
    env_file:
      - ./ml-server/.env.docker
    networks:
      - syncstay-net

networks:
  syncstay-net:
    driver: bridge
